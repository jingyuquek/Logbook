{% extends "taskbar.html" %}
{% block title %}Add Fault - {{ vehicle.license_plate }}{% endblock %}

{% block content %}

<style>
.add-fault-card {
    max-width: 600px;
    margin: auto;
    background: #1e1e1e;
    padding: 24px;
    border-radius: 10px;
}

.add-fault-card h2 {
    margin-bottom: 16px;
}

textarea {
    width: 100%;
    min-height: 120px;
    padding: 10px;
    border-radius: 6px;
    background: #2a2a2a;
    color: #e0e0e0;
    border: 1px solid #333;
}

button {
    margin-top: 16px;
    padding: 10px 16px;
    border-radius: 6px;
    border: none;
    background: #2e7d32;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #388e3c;
}

.back-link {
    display: inline-block;
    margin-top: 12px;
    color: #90caf9;
    text-decoration: none;
}
</style>

<div class="add-fault-card">
    <h2>Add Fault — {{ vehicle.license_plate }}</h2>

    <form method="POST">
        <textarea
            name="description"
            placeholder="Describe the fault..."
            required
        ></textarea>

        <button type="submit">Save Fault</button>
    </form>

    <a class="back-link" href="{{ url_for('faults.view_faults', license_plate=vehicle.license_plate) }}">
        ← Back to faults
    </a>
</div>

{% endblock %}
