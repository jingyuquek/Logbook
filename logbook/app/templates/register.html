<!DOCTYPE html>
<html>
<head>
    <title>Register - Vehicle Tracker</title>
    <style>
        body { font-family: Arial; background-color:#121212; color:#fff; display:flex; justify-content:center; align-items:center; min-height:100vh; margin: 0; }
        .register-box { background-color:#1e1e1e; padding:30px; border-radius:8px; width:350px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { margin-top: 0; text-align: center; color: #4caf50; }
        label { display: block; margin-top: 10px; font-size: 0.9rem; color: #bbb; }
        input, select { width:100%; padding:10px; margin:5px 0; border-radius:4px; border:1px solid #444; background-color:#2c2c2c; color:#fff; box-sizing: border-box; }
        input:focus, select:focus { outline: none; border-color: #4caf50; }
        button { padding:12px; margin-top:20px; background-color:#4caf50; border:none; border-radius:4px; color:white; cursor:pointer; width:100%; font-weight: bold; }
        button:hover { background-color:#45a049; }
        .hidden { display:none; }
        .message { color:#ff5555; font-size:0.9rem; text-align: center; }
        a { color: #4caf50; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="register-box">
    <h2>Register</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, msg in messages %}
                <p class="message">{{ msg }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST" autocomplete="off">
        <label>Rank / Name:</label>
        <input type="text" name="username" required placeholder="">

        <label>Password:</label>
        <input type="password" name="password" required>

        <label>Role:</label>
        <select name="role" id="roleSelect" required>
            <option value="">-- Select Role --</option>
            <option value="unit_admin">Unit Admin</option>
            <option value="admin">Admin (Company)</option>
            <option value="manager">Manager</option>
            <option value="user">User</option>
        </select>

        <label>Unit Name:</label>
        <input type="text" name="unit_name" id="unitInput" required placeholder="e.g. 1st Battalion">

        <div id="unitPasscodeDiv" class="hidden">
            <label>Unit Passcode:</label>
            <input type="password" name="unit_passcode" placeholder="Enter Unit Admin Key">
        </div>

        <div id="companyDiv" class="hidden">
            <label>Company Name:</label>
            <input type="text" name="company_name" id="companyInput" placeholder="e.g. Alpha Coy">
        </div>

        <div id="companyPasscodeDiv" class="hidden">
            <label>Company Passcode:</label>
            <input type="password" name="company_passcode" placeholder="Enter Company Key">
        </div>

        <button type="submit">Create Account</button>
    </form>

    <p style="margin-top:20px; text-align: center; font-size: 0.9rem;">
        Already have an account? <a href="{{ url_for('auth.login') }}">Login here</a>
    </p>
</div>

<script>
    const roleSelect = document.getElementById("roleSelect");
    const unitPassDiv = document.getElementById("unitPasscodeDiv");
    const companyDiv = document.getElementById("companyDiv");
    const companyPassDiv = document.getElementById("companyPasscodeDiv");
    const companyInput = document.getElementById("companyInput");

    function toggleSections() {
        const role = roleSelect.value;
        
        // Hide and clear requirements by default
        unitPassDiv.classList.add("hidden");
        companyDiv.classList.add("hidden");
        companyPassDiv.classList.add("hidden");
        companyInput.removeAttribute("required");

        if(role === "unit_admin") {
            unitPassDiv.classList.remove("hidden");
        } else if(role === "admin" || role === "manager" || role === "user") {
            companyDiv.classList.remove("hidden");
            companyPassDiv.classList.remove("hidden");
            companyInput.setAttribute("required", "required");
        }
    }

    roleSelect.addEventListener("change", toggleSections);
    toggleSections(); // Handle browser back-button caching safely
</script>

</body>
</html>
